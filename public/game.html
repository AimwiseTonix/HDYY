<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDYY — 游戏中</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container" id="gameContainer">
  <video id="gameVideo" preload="auto" playsinline></video>

  <div id="choiceOverlay" class="choice-overlay">
    <div class="choice-prompt">做出你的选择</div>
    <div class="choice-buttons">
      <button id="btnA" class="btn-choice">A</button>
      <button id="btnB" class="btn-choice">B</button>
    </div>
  </div>
</div>

<script>
let storyData = null;
let currentNode = null;

const video = document.getElementById('gameVideo');
const overlay = document.getElementById('choiceOverlay');
const btnA = document.getElementById('btnA');
const btnB = document.getElementById('btnB');
const container = document.getElementById('gameContainer');

// ---- Load story ----
async function loadStory() {
  const res = await fetch('/api/story');
  storyData = await res.json();
}

function getNode(videoName) {
  return storyData.nodes[videoName] || null;
}

// ---- Play video (direct HTTP streaming) ----
function playVideo(videoName) {
  hideChoices();

  // Clear handlers
  video.onloadedmetadata = null;
  video.ontimeupdate = null;
  video.onended = null;
  video.onwaiting = null;
  video.oncanplay = null;

  currentNode = getNode(videoName);

  // Set event handlers BEFORE setting src
  if (!currentNode || !currentNode.choices || currentNode.choices.length === 0) {
    video.onended = () => showToast('故事结束', 'success');
  } else {
    video.onloadedmetadata = () => {
      const duration = video.duration;
      if (duration && isFinite(duration)) {
        const triggerTime = Math.max(duration - 2, 0);
        video.ontimeupdate = () => {
          if (video.currentTime >= triggerTime && !overlay.classList.contains('active')) {
            showChoices(currentNode);
          }
        };
      }
    };
    video.onended = () => {
      if (!overlay.classList.contains('active')) showChoices(currentNode);
    };
  }

  // Buffering indicator
  video.onwaiting = () => showStatus('缓冲中...');
  video.oncanplay = () => hideStatus();

  showStatus('缓冲中...');
  // Use CDN for video if available, fallback to direct
  var cdn = (window.CDN_BASE || '');
  video.src = cdn + '/api/video/' + encodeURIComponent(videoName);
  video.load();
  video.play().catch(() => {});
}

// ---- Choices ----
function showChoices(node) {
  video.pause();
  const choices = node.choices || [];
  if (choices.length === 0) return;

  btnA.textContent = choices[0]?.label || 'A';
  if (choices[1]) {
    btnB.style.display = '';
    btnB.textContent = choices[1].label || 'B';
    btnB.onclick = () => selectChoice(choices[1]);
  } else {
    btnB.style.display = 'none';
  }
  btnA.onclick = () => selectChoice(choices[0]);

  overlay.classList.add('active');
}

function selectChoice(choice) {
  if (!choice || !choice.nextVideo) return;
  hideChoices();
  playVideo(choice.nextVideo);
}

function hideChoices() {
  overlay.classList.remove('active');
}

// ---- Status ----
function showStatus(msg) {
  let el = document.getElementById('loadStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadStatus';
    el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#888;font-size:16px;letter-spacing:4px;z-index:5;pointer-events:none;';
    container.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = '';
}

function hideStatus() {
  const el = document.getElementById('loadStatus');
  if (el) el.style.display = 'none';
}

// ---- Title screen ----
function showTitleScreen(callback) {
  const title = document.createElement('div');
  title.id = 'titleScreen';
  title.style.cssText = 'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:50;cursor:pointer;gap:30px;';
  title.innerHTML = `
    <div style="font-size:48px;letter-spacing:16px;color:#fff;">HDYY</div>
    <div style="color:#666;letter-spacing:4px;font-size:13px;">点击开始</div>
  `;
  title.addEventListener('click', () => { title.remove(); callback(); });
  document.body.appendChild(title);
}

// ---- Toast ----
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ---- Init ----
(async function init() {
  // Load CDN config first
  try {
    const cfgRes = await fetch('/api/config');
    const cfg = await cfgRes.json();
    if (cfg.cdnBase) window.CDN_BASE = cfg.cdnBase;
  } catch (e) {}

  await loadStory();

  if (!storyData.startVideo) {
    document.body.innerHTML = `
      <div class="landing">
        <div class="choice-prompt">尚未配置起始视频</div>
        <p style="color:#666;margin-top:10px;letter-spacing:2px;font-size:13px;">
          请先前往 <a href="/admin.html" style="color:#aaa;">后台管理</a> 上传视频并配置剧情
        </p>
      </div>`;
    return;
  }

  showTitleScreen(() => playVideo(storyData.startVideo));
})();
</script>
</body>
</html>
